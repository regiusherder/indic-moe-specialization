# Single source of truth for the study. Every script reads this file;
# nothing is hardcoded elsewhere. Changing an experiment parameter means
# changing exactly one line here, and the run manifest hashes this file
# so every result is traceable to the config that produced it.

# Seeds: the full run matrix is (models) x (sampling conditions) x (seeds).
# Two seeds let us measure how much the small ablation/permutation differentials
# move run-to-run (critique #22). Seed 0 controls sampling-independent randomness
# (permutation shuffles, bootstrap, random-expert ablation); the aligned/token
# sampling itself is deterministic so seeds only affect the stochastic analyses.
seeds: [42, 1234]

models:
  olmoe:
    hf_id: "allenai/OLMoE-1B-7B-0125"
    revision: null            # pin to a commit hash once you've picked a version, e.g. "main" resolves at run time otherwise
    adapter: "olmoe"
    quantization: "4bit"
  qwen_moe:
    hf_id: "Qwen/Qwen1.5-MoE-A2.7B"
    revision: null
    adapter: "qwen_moe"
    quantization: "4bit"
  deepseek_moe:
    hf_id: "deepseek-ai/deepseek-moe-16b-base"
    revision: null
    adapter: "deepseek_moe"
    quantization: "4bit"

# FLORES-200 language codes with linguistic metadata.
# `pair_id`: languages sharing a pair_id are the SAME language in DIFFERENT
# scripts -- the clean script-vs-language controls (critique #25). We now have
# TWO such pairs, not one: Hindi/Urdu and Kashmiri-Deva/Kashmiri-Arab.
languages:
  english:      {code: eng_Latn, family: Indo-European, script: Latin,        pair_id: null}
  # --- Indo-Aryan, Devanagari ---
  hindi:        {code: hin_Deva, family: Indo-Aryan,     script: Devanagari,   pair_id: hindustani}
  marathi:      {code: mar_Deva, family: Indo-Aryan,     script: Devanagari,   pair_id: null}
  nepali:       {code: npi_Deva, family: Indo-Aryan,     script: Devanagari,   pair_id: null}
  kashmiri_deva: {code: kas_Deva, family: Indo-Aryan,    script: Devanagari,   pair_id: kashmiri}
  # --- Indo-Aryan, other scripts ---
  bengali:      {code: ben_Beng, family: Indo-Aryan,     script: Bengali,      pair_id: null}
  assamese:     {code: asm_Beng, family: Indo-Aryan,     script: Bengali,      pair_id: null}
  gujarati:     {code: guj_Gujr, family: Indo-Aryan,     script: Gujarati,     pair_id: null}
  punjabi:      {code: pan_Guru, family: Indo-Aryan,     script: Gurmukhi,     pair_id: null}
  odia:         {code: ory_Orya, family: Indo-Aryan,     script: Odia,         pair_id: null}
  urdu:         {code: urd_Arab, family: Indo-Aryan,     script: Perso-Arabic, pair_id: hindustani}
  sindhi:       {code: snd_Arab, family: Indo-Aryan,     script: Perso-Arabic, pair_id: null}
  kashmiri_arab: {code: kas_Arab, family: Indo-Aryan,    script: Perso-Arabic, pair_id: kashmiri}
  # --- Dravidian (FLORES has exactly these four) ---
  tamil:        {code: tam_Taml, family: Dravidian,      script: Tamil,        pair_id: null}
  telugu:       {code: tel_Telu, family: Dravidian,      script: Telugu,       pair_id: null}
  malayalam:    {code: mal_Mlym, family: Dravidian,      script: Malayalam,    pair_id: null}
  kannada:      {code: kan_Knda, family: Dravidian,      script: Kannada,      pair_id: null}

data:
  flores_url: "https://dl.fbaipublicfiles.com/nllb/flores200_dataset.tar.gz"
  flores_sha256: null   # filled in automatically on first download and verified on every subsequent run
  split: "devtest"

  # TWO sampling conditions, run for every model. Family structure that shows
  # up under BOTH answers critiques #5 (content confound) and #6 (parallel
  # corpus) together -- neither confound can then explain it.
  sampling_conditions:
    # (a) equal TOKENS per language (original scheme): equal statistical
    #     precision, but each language covers different CONTENT (English spans
    #     ~736 FLORES sentences to reach the budget, Malayalam ~73).
    token_capped:
      max_tokens_per_language: 20000
      max_sentences_pool: 1012
    # (b) same ALIGNED sentences for every language: identical content across
    #     languages (FLORES is sentence-aligned), but token counts then differ
    #     by fertility. n_sentences = the full devtest set.
    aligned:
      n_aligned_sentences: 1012   # full FLORES-200 devtest; identical indices for all languages

routing:
  # JSD is computed per-layer using routed experts only (shared experts, where
  # present, are excluded -- see adapters/). Both hard (top-k counts) and soft
  # (mean softmax) metrics are computed and compared.
  permutation_test:
    n_permutations: 1000
    alpha: 0.001
  bootstrap:
    n_resamples: 200      # sentence-level bootstrap for CIs on JSD estimates

ablation:
  # top_n_experts is now a SWEEP (critique #17): report the causal effect at
  # several ablation sizes so the conclusion doesn't hinge on one unmotivated k.
  top_n_experts_sweep: [4, 8, 16]
  n_random_controls: 10   # random-expert-ablation trials, for the causal control
  perplexity_max_tokens: 2000
  # min_usage_floor (critique #16): when picking "family-preferring" experts by
  # target/other usage RATIO, ignore experts whose overall usage is below this
  # fraction of uniform (1/n_experts). Without a floor the +1e-8 smoothing lets
  # near-zero-traffic experts dominate the ratio and get ablated for no effect.
  min_usage_floor_frac: 0.5
  # knockout mechanism (critique #18): "renorm" = old behavior (zero the
  # ablated experts' routing weight and renormalize survivors, which upweights
  # neighbors); "drop" = remove from top-k WITHOUT renormalizing (isolates the
  # ablated expert's own contribution). "drop" is the cleaner causal test.
  knockout: "drop"

output:
  results_dir: "results"
  # results are written to results/<sampling_condition>/<seed>/<model>/... so the
  # full matrix never collides. checkpoint_after_each keeps per-language resume.
  checkpoint_after_each: true
